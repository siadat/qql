name: release

# Cuts a GitHub Release with cross-compiled binaries whenever a v* tag is pushed.
# To release: git tag v0.1.0 && git push --tags
on:
  push:
    tags: ['v*']

# Required for `gh release create` to create the Release on our behalf.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Single source of truth for the Go version — bump go.mod and CI follows.
          go-version-file: go.mod

      - name: Build binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          # Add (os, arch) pairs here to publish more targets.
          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )
          for t in "${targets[@]}"; do
            read -r os arch <<< "$t"
            ext=""
            [ "$os" = "windows" ] && ext=".exe"
            bin="qql${ext}"
            archive="qql_${GITHUB_REF_NAME}_${os}_${arch}"
            # CGO_ENABLED=0  → fully static binary, no glibc/musl coupling.
            # -trimpath      → drop absolute build paths, makes builds reproducible.
            # -ldflags -s -w → strip the symbol table and DWARF, ~30% smaller.
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w" -o "dist/${bin}" .
            # Windows ecosystems expect .zip; everywhere else, gzipped tar.
            if [ "$os" = "windows" ]; then
              (cd dist && zip "${archive}.zip" "${bin}" && rm "${bin}")
            else
              (cd dist && tar -czf "${archive}.tar.gz" "${bin}" && rm "${bin}")
            fi
          done
          # Single checksum file covering every artifact in the release.
          (cd dist && sha256sum * > checksums.txt)

      - name: Create release
        env:
          # The default GITHUB_TOKEN; gh CLI looks for GH_TOKEN.
          GH_TOKEN: ${{ github.token }}
        # --generate-notes: auto-fill release notes from commits since the previous tag.
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes
